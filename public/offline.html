<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101114" />
    <title>Hyperion Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: rgba(22, 24, 28, 0.86);
        --line: rgba(255, 255, 255, 0.14);
        --text: #f5f7f0;
        --muted: #aeb6b0;
        --primary: #b8ff44;
        --cool: #75d7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        color: var(--text);
        background:
          conic-gradient(from 215deg at 18% 22%, rgba(184, 255, 68, 0.24), transparent 32%, rgba(117, 215, 255, 0.18), transparent 62%),
          var(--bg);
      }

      main {
        width: min(460px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 22px;
        background: var(--panel);
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px);
      }

      svg {
        width: 52px;
        height: 52px;
        color: var(--primary);
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 28px;
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
        padding: 0 14px;
        border-radius: 7px;
        color: #162107;
        background: linear-gradient(135deg, var(--primary), var(--cool));
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <rect width="64" height="64" rx="12" fill="currentColor" opacity="0.18" />
        <path
          d="M18 20c14.36 0 26 11.64 26 26m-26-14c7.73 0 14 6.27 14 14m-14-1.5h.02"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-width="6"
        />
      </svg>
      <h1>Offline</h1>
      <p>Network is unavailable. Reopen Hyperion after your connection returns, or keep reading cached content from the installed app.</p>
      <a href="/">Open reader</a>
    </main>
  </body>
</html>
